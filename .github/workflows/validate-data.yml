name: Validate sample data

on:
  push:
    paths:
      - 'data/sample.json'
  pull_request:
    paths:
      - 'data/sample.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate
